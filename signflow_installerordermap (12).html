<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SignFlow — Installer Order Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,sans-serif;font-size:14px;color:#111}
.app{display:flex;width:100%;height:100%}
.sidebar{width:200px;min-width:200px;height:100%;background:#fff;border-right:0.5px solid rgba(0,0,0,.1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.logo{padding:13px 15px 11px;border-bottom:0.5px solid rgba(0,0,0,.1);flex-shrink:0}
.logo-name{font-size:15px;font-weight:500}
.logo-sub{font-size:10px;color:#999}
.nav-label{font-size:10px;font-weight:500;color:#999;letter-spacing:.08em;text-transform:uppercase;padding:9px 15px 4px;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 15px;font-size:13px;color:#555;cursor:pointer;border-left:2px solid transparent;flex-shrink:0}
.nav-item:hover{background:#f5f5f5}
.nav-item.active{color:#185FA5;background:#E6F1FB;border-left-color:#185FA5}
.inst-list{flex:1;overflow-y:auto;min-height:0}
.inst-row{display:flex;align-items:center;gap:8px;padding:8px 13px;cursor:pointer;border-left:2px solid transparent}
.inst-row:hover{background:#f5f5f5}
.inst-row.active{background:#f0f0f0;border-left-color:#185FA5}
.inst-dot{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.inst-name{font-size:12px;font-weight:500;flex:1;line-height:1.3}
.inst-cnt{font-size:10px;color:#aaa;background:#f5f5f3;padding:1px 5px;border-radius:8px;flex-shrink:0}
.sb-footer{padding:11px 15px;border-top:0.5px solid rgba(0,0,0,.1);font-size:11px;color:#999;line-height:1.8;flex-shrink:0}
.main{flex:1;height:100%;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1);padding:0 12px;height:48px;min-height:48px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:nowrap;overflow:hidden}
.chip{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,.15);color:#555;white-space:nowrap;background:#fff;flex-shrink:0}
.chip.on{background:#185FA5;color:#fff;border-color:#185FA5}
.btn{padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:0.5px solid rgba(0,0,0,.2);background:#fff;color:#111;white-space:nowrap;flex-shrink:0}
.btn-green{background:#16A322;color:#fff;border-color:#16A322;font-weight:600}
.assign-bar{display:none;align-items:center;gap:10px;padding:7px 14px;background:#f5f5f3;border-bottom:0.5px solid rgba(0,0,0,.1);flex-shrink:0}
.map-wrap{flex:1;position:relative;min-height:0;overflow:hidden}
.map-wrap #map{position:absolute;inset:0}
.legend{position:absolute;bottom:20px;left:12px;z-index:900;background:#fff;border:0.5px solid rgba(0,0,0,.12);border-radius:10px;padding:11px 14px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.leg-title{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:#444;cursor:pointer}
.stats-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:900;display:flex;gap:5px;pointer-events:all}
.spill{background:#fff;border:0.5px solid rgba(0,0,0,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;color:#555;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;white-space:nowrap}
.spill.on{background:#185FA5;color:#fff;border-color:#185FA5}
.spill b{font-weight:700;margin-right:3px}
.op-panel{position:absolute;top:0;right:0;bottom:0;width:260px;background:#fff;border-left:0.5px solid rgba(0,0,0,.1);z-index:800;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.op-panel.open{transform:translateX(0)}
.op-hdr{padding:11px 13px;border-bottom:0.5px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.op-body{flex:1;overflow-y:auto}
.op-dh{padding:5px 13px 2px;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;background:#f9f9f7;border-bottom:0.5px solid rgba(0,0,0,.06)}
.op-row{padding:9px 13px;border-bottom:0.5px solid rgba(0,0,0,.07);cursor:pointer}
.op-row:hover{background:#fafaf9}
.op-row.sel{background:#E6F1FB}
.op-addr{font-size:12px;font-weight:500;margin-bottom:2px}
.op-agent{font-size:11px;color:#999}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:14px;padding:22px;width:480px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo"><div class="logo-name">SignFlow</div><div class="logo-sub">Installer Order Map</div></div>
    <div class="nav-label">Navigation</div>
    <div class="nav-item"><div style="width:8px;height:8px;border-radius:50%;background:#185FA5;flex-shrink:0"></div>Dashboard</div>
    <div class="nav-item active">
      <svg width="13" height="14" viewBox="0 0 13 14" fill="none"><path d="M6.5 0C3.46 0 1 2.46 1 5.5c0 4.125 5.5 8.5 5.5 8.5S12 9.625 12 5.5C12 2.46 9.54 0 6.5 0z" stroke="currentColor" stroke-width="1.2"/><circle cx="6.5" cy="5.5" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
      Installer Order Map
    </div>
    <div class="nav-item"><div style="width:8px;height:8px;border-radius:50%;background:#BA7517;flex-shrink:0"></div>Schedule</div>
    <div class="nav-item"><div style="width:8px;height:8px;border-radius:50%;background:#7F77DD;flex-shrink:0"></div>Order history</div>
    <div class="nav-label">Installers</div>
    <div class="inst-list" id="inst-list"></div>
    <div class="sb-footer" id="sb-footer">Loading...</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="chip on" id="c-all"  onclick="setFilter('all')">All</span>
      <span class="chip"    id="c-up"   onclick="setFilter('up')">UP</span>
      <span class="chip"    id="c-dn"   onclick="setFilter('dn')">DOWN</span>
      <span class="chip"    id="c-svc"  onclick="setFilter('svc')">Service</span>
      <span class="chip"    id="c-none" onclick="setFilter('none')">Unassigned</span>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#555;cursor:pointer;flex-shrink:0;margin-left:4px">
        <input type="checkbox" id="auto-assign" onchange="toggleAutoAssign(this.checked)">Auto-assign
      </label>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="btn" onclick="togglePanel()">Order list</button>
        <button class="btn" onclick="alert('New order')">+ New order</button>
        <button class="btn btn-green" onclick="scheduleAll()">📋 Schedule all</button>
      </div>
    </div>

    <div class="assign-bar" id="assign-bar"></div>

    <div class="map-wrap">
      <div id="map"></div>

      <div class="stats-bar">
        <div class="spill on" id="sp-all"  onclick="setFilter('all')"><b id="sc-all">0</b>Total</div>
        <div class="spill"    id="sp-up"   onclick="setFilter('up')"><b id="sc-up">0</b>UP</div>
        <div class="spill"    id="sp-dn"   onclick="setFilter('dn')"><b id="sc-dn">0</b>DOWN</div>
        <div class="spill"    id="sp-svc"  onclick="setFilter('svc')"><b id="sc-svc">0</b>Service</div>
        <div class="spill"    id="sp-none" onclick="setFilter('none')"><b id="sc-none">0</b>Unassigned</div>
      </div>

      <div class="legend">
        <div class="leg-title">Pin labels</div>
        <div class="leg-row"><svg width="12" height="18" viewBox="0 0 12 18"><path d="M6 0C2.69 0 0 2.69 0 6c0 4.5 6 12 6 12S12 10.5 12 6C12 2.69 9.31 0 6 0z" fill="#1A56E8"/><text x="6" y="9" text-anchor="middle" font-size="5" font-weight="900" fill="white" font-family="system-ui">UP</text></svg>&nbsp;Installation</div>
        <div class="leg-row"><svg width="12" height="18" viewBox="0 0 12 18"><path d="M6 0C2.69 0 0 2.69 0 6c0 4.5 6 12 6 12S12 10.5 12 6C12 2.69 9.31 0 6 0z" fill="#555"/><text x="6" y="9" text-anchor="middle" font-size="5" font-weight="900" fill="white" font-family="system-ui">DN</text></svg>&nbsp;Removal</div>
        <div class="leg-row"><svg width="12" height="18" viewBox="0 0 12 18"><path d="M6 0C2.69 0 0 2.69 0 6c0 4.5 6 12 6 12S12 10.5 12 6C12 2.69 9.31 0 6 0z" fill="#E8A000"/><text x="6" y="9" text-anchor="middle" font-size="5" font-weight="900" fill="white" font-family="system-ui">R</text></svg>&nbsp;Service/Repair</div>
        <div class="leg-row"><svg width="12" height="18" viewBox="0 0 12 18"><path d="M6 0C2.69 0 0 2.69 0 6c0 4.5 6 12 6 12S12 10.5 12 6C12 2.69 9.31 0 6 0z" fill="#222222"/><text x="6" y="9" text-anchor="middle" font-size="5" font-weight="900" fill="white" font-family="system-ui">?</text></svg>&nbsp;Unassigned</div>
        <div class="leg-title" style="margin-top:10px">Installers</div>
        <div id="leg-inst"></div>
      </div>

      <div class="op-panel" id="op-panel">
        <div class="op-hdr">
          <div style="font-size:13px;font-weight:500" id="op-title">Orders</div>
          <button class="btn" onclick="togglePanel()">Close</button>
        </div>
        <div class="op-body" id="op-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- SCHEDULE MODAL -->
<div class="modal-bg" id="sched-modal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:16px;font-weight:600">Schedule all installers</div>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
    <div id="sched-body"></div>
  </div>
</div>

<script>
const INST=[
  {id:1,first:'Juan', last:'Rodriguez',ini:'JR',color:'#E8131B'},
  {id:2,first:'Tom',  last:'Kovacs',   ini:'TK',color:'#1A56E8'},
  {id:3,first:'Maria',last:'Santos',   ini:'MS',color:'#16A322'},
  {id:4,first:'Devon',last:'Williams', ini:'DW',color:'#E8A000'},
];
const BASES=[
  {id:1,lat:32.350,lng:-110.950},
  {id:2,lat:32.290,lng:-111.010},
  {id:3,lat:32.240,lng:-110.930},
  {id:4,lat:32.380,lng:-110.970},
];
const ORDERS=[
  {id:1, lat:32.312,lng:-110.927,addr:'4821 E Sunrise Dr',       agent:'Angela Tennison',type:'install', iid:1,date:'04/27'},
  {id:2, lat:32.341,lng:-110.989,addr:'220 W Magee Rd',          agent:'Sarah Johnson',  type:'remove',  iid:1,date:'04/27'},
  {id:3, lat:32.268,lng:-110.916,addr:'7910 E Golf Links Rd',    agent:'Linda Park',     type:'service', iid:2,date:'04/27'},
  {id:4, lat:32.298,lng:-110.970,addr:'3300 N Campbell Ave',     agent:'Mike Torres',    type:'install', iid:2,date:'04/27'},
  {id:5, lat:32.271,lng:-110.953,addr:'5500 E Speedway Blvd',    agent:'Chris Davis',    type:'remove',  iid:3,date:'04/27'},
  {id:6, lat:32.345,lng:-111.031,addr:'7703 N Oracle Rd',        agent:'Angela Tennison',type:'install', iid:3,date:'04/27'},
  {id:7, lat:32.258,lng:-110.971,addr:'4100 S 6th Ave',          agent:'Dana Hill',      type:'service', iid:null,date:'04/27'},
  {id:8, lat:32.391,lng:-110.974,addr:'10100 N Oracle Rd',       agent:'Bev Stone',      type:'install', iid:null,date:'04/27'},
  {id:9, lat:32.320,lng:-110.958,addr:'1800 N Stone Ave',        agent:'Rex Morgan',     type:'install', iid:4,date:'04/28'},
  {id:10,lat:32.245,lng:-110.915,addr:'5300 E 29th St',          agent:'Julia Kim',      type:'remove',  iid:4,date:'04/28'},
  {id:11,lat:32.356,lng:-110.989,addr:'8500 N Thornydale Rd',    agent:'Mark Burns',     type:'install', iid:1,date:'04/28'},
  {id:12,lat:32.291,lng:-110.899,addr:'9200 E Tanque Verde Rd',  agent:'Angela Tennison',type:'install', iid:2,date:'04/28'},
  {id:13,lat:32.264,lng:-110.983,addr:'740 W Ajo Way',           agent:'Sarah Johnson',  type:'delivery',iid:3,date:'04/28'},
  {id:14,lat:32.339,lng:-111.020,addr:'7000 N La Cholla Blvd',  agent:'Mike Torres',    type:'install', iid:null,date:'04/28'},
  {id:15,lat:32.224,lng:-110.996,addr:'3600 W Irvington Rd',     agent:'Linda Park',     type:'remove',  iid:4,date:'04/28'},
  {id:16,lat:32.310,lng:-110.940,addr:'2200 E Fort Lowell Rd',   agent:'Dana Hill',      type:'service', iid:1,date:'04/28'},
  {id:17,lat:32.280,lng:-110.928,addr:'7900 E Golf Links Rd',    agent:'Angela Tennison',type:'install', iid:null,date:'04/29'},
  {id:18,lat:32.368,lng:-110.941,addr:'4500 N Flowing Wells Rd', agent:'Bev Stone',      type:'install', iid:2,date:'04/29'},
  {id:19,lat:32.230,lng:-110.962,addr:'9901 E Broadway Blvd',    agent:'Rex Morgan',     type:'remove',  iid:3,date:'04/29'},
  {id:20,lat:32.305,lng:-110.960,addr:'1550 S Kolb Rd',          agent:'Julia Kim',      type:'install', iid:4,date:'04/29'},
  {id:21,lat:31.855,lng:-111.004,addr:'631 W Paseo del Canto',   agent:'Tom Freeland',   type:'install', iid:1,date:'04/27'},
  {id:22,lat:31.862,lng:-110.993,addr:'1450 S Camino del Sol',   agent:'Carol Hein',     type:'remove',  iid:2,date:'04/27'},
];

const TLBL={install:'UP',remove:'DN',service:'R',delivery:'DL'};
const TCOLOR={install:'#1A56E8',remove:'#555555',service:'#E8A000',delivery:'#16A322'};

let MAP, oMarkers=[], iMarkers=[], curFilter='all', curInst=null, panelOpen=false;

function pinColor(o){
  if(!o.iid) return '#222222';
  return INST.find(i=>i.id===o.iid)?.color||'#222222';
}

function makePin(lbl,color,initials){
  const topLabel=initials||lbl;
  const html=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 32 44">
    <filter id="ds"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/></filter>
    <g filter="url(#ds)">
      <circle cx="16" cy="16" r="16" fill="${color}"/>
      <polygon points="10,26 22,26 16,44" fill="${color}"/>
    </g>
    <circle cx="16" cy="16" r="9" fill="rgba(255,255,255,0.9)"/>
    <text x="16" y="20" text-anchor="middle" font-size="${initials?'7':'8'}" font-family="system-ui,sans-serif" font-weight="900" fill="${color}">${topLabel}</text>
  </svg>`;
  return L.divIcon({html,iconSize:[32,44],iconAnchor:[16,44],popupAnchor:[0,-46],className:''});
}

function makeInstPin(inst){
  const html=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="17" fill="${inst.color}" stroke="white" stroke-width="2"/>
    <text x="18" y="23" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" font-weight="800" fill="white">${inst.ini}</text>
  </svg>`;
  return L.divIcon({html,iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20],className:''});
}

function getFiltered(){
  return ORDERS.filter(o=>{
    if(curInst!==null&&o.iid!==curInst)return false;
    if(curFilter==='up'&&o.type!=='install')return false;
    if(curFilter==='dn'&&o.type!=='remove')return false;
    if(curFilter==='svc'&&o.type!=='service')return false;
    if(curFilter==='none'&&o.iid!==null)return false;
    return true;
  });
}

function drawOrders(){
  oMarkers.forEach(m=>MAP.removeLayer(m));
  oMarkers=[];
  getFiltered().forEach(o=>{
    const inst=INST.find(i=>i.id===o.iid);
    const initials=inst?inst.ini:null;
    const m=L.marker([o.lat,o.lng],{icon:makePin(TLBL[o.type]||'?',pinColor(o),initials),zIndexOffset:1000}).addTo(MAP);
    const opts=`<option value="">-- Unassigned --</option>`+
      INST.map(i=>`<option value="${i.id}"${o.iid===i.id?' selected':''}>${i.first} ${i.last} (${i.ini})</option>`).join('');
    m.bindPopup(`<div style="font-size:12px;min-width:210px;font-family:system-ui">
      <div style="font-weight:700;font-size:13px;margin-bottom:3px">${o.addr}</div>
      <div style="color:#777;font-size:11px;margin-bottom:2px">Agent: ${o.agent}</div>
      <div style="color:#aaa;font-size:10px;margin-bottom:8px">${o.date}</div>
      <span style="background:${TCOLOR[o.type]||'#888'};color:#fff;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800">${TLBL[o.type]}</span>
      <div style="margin-top:10px;font-size:11px;font-weight:500;color:#555;margin-bottom:4px">Installer:</div>
      <select class="inst-select" data-oid="${o.id}" style="width:100%;padding:7px 8px;border:2px solid ${pinColor(o)};border-radius:8px;font-size:12px;font-weight:500;background:#fff;cursor:pointer">
        ${opts}
      </select>
      ${o.iid?`<div style="margin-top:5px;font-size:10px;color:#555">Currently: <span style="font-weight:600;color:${pinColor(o)}">${INST.find(i=>i.id===o.iid)?.first} ${INST.find(i=>i.id===o.iid)?.last}</span></div>`
        :'<div style="margin-top:5px;font-size:10px;color:#222;font-weight:600">⚠ Unassigned — please assign an installer</div>'}
    </div>`,{maxWidth:240,minWidth:215});
    m.on('popupopen',function(){
      MAP.on('click',function(){});// keep map active
    });
    oMarkers.push(m);
  });
  drawPanel();

  // Global event delegation — catches select changes inside any Leaflet popup
  document.removeEventListener('change',_onSelectChange);
  document.addEventListener('change',_onSelectChange);
}

function _onSelectChange(e){
  const sel=e.target;
  if(!sel.classList.contains('inst-select'))return;
  const oid=parseInt(sel.dataset.oid);
  assignInst(oid,sel.value);
}

function drawInstallers(){
  // Installer circle pins removed — sidebar handles filtering
  // Order pins are colored by installer so you can see assignments on the map
  iMarkers.forEach(m=>MAP.removeLayer(m));
  iMarkers=[];
}

function drawSidebar(){
  document.getElementById('inst-list').innerHTML=INST.map(inst=>{
    const cnt=ORDERS.filter(o=>o.iid===inst.id).length;
    return`<div class="inst-row${curInst===inst.id?' active':''}" onclick="filterByInst(${inst.id})">
      <div class="inst-dot" style="background:${inst.color}">${inst.ini}</div>
      <div class="inst-name">${inst.first}<br><span style="font-weight:400;color:#999;font-size:10px">${inst.last}</span></div>
      <div class="inst-cnt">${cnt}</div>
    </div>`;
  }).join('');
  const u=ORDERS.filter(o=>!o.iid).length;
  document.getElementById('sb-footer').innerHTML=
    `${ORDERS.length} orders · ${INST.length} installers<br>`+
    (u?`<span style="color:#222;font-weight:500">${u} unassigned</span>`:`<span style="color:#16A322">All assigned ✓</span>`);
}

function drawLegend(){
  document.getElementById('leg-inst').innerHTML=INST.map(inst=>`
    <div class="leg-row" onclick="filterByInst(${inst.id})">
      <svg width="12" height="18" viewBox="0 0 12 18"><path d="M6 0C2.69 0 0 2.69 0 6c0 4.5 6 12 6 12S12 10.5 12 6C12 2.69 9.31 0 6 0z" fill="${inst.color}"/><text x="6" y="9" text-anchor="middle" font-size="4.5" font-weight="900" fill="white" font-family="system-ui">${inst.ini}</text></svg>
      ${inst.first} ${inst.last}
    </div>`).join('');
}

function drawPanel(){
  const f=getFiltered();
  const g={};
  f.forEach(o=>{if(!g[o.date])g[o.date]=[];g[o.date].push(o);});
  document.getElementById('op-title').textContent=f.length+' order'+(f.length!==1?'s':'');
  document.getElementById('op-body').innerHTML=Object.entries(g).sort().map(([d,ords])=>
    `<div class="op-dh">${d}</div>`+ords.map(o=>{
      const inst=INST.find(i=>i.id===o.iid);
      return`<div class="op-row">
        <div style="display:flex;gap:5px;margin-bottom:3px">
          <span style="background:${TCOLOR[o.type]||'#888'};color:#fff;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:800">${TLBL[o.type]}</span>
          ${inst?`<span style="background:${inst.color};color:#fff;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700">${inst.ini}</span>`
            :`<span style="color:#E8131B;font-size:9px;font-weight:700">UNASSIGNED</span>`}
        </div>
        <div class="op-addr">${o.addr}</div>
        <div class="op-agent">${o.agent}</div>
      </div>`;
    }).join('')).join('')||`<div style="padding:20px;text-align:center;color:#999;font-size:13px">No orders.</div>`;
}

function updateStats(){
  document.getElementById('sc-all').textContent=ORDERS.length;
  document.getElementById('sc-up').textContent=ORDERS.filter(o=>o.type==='install').length;
  document.getElementById('sc-dn').textContent=ORDERS.filter(o=>o.type==='remove').length;
  document.getElementById('sc-svc').textContent=ORDERS.filter(o=>o.type==='service').length;
  document.getElementById('sc-none').textContent=ORDERS.filter(o=>!o.iid).length;
}

function assignInst(oid,iid){
  const o=ORDERS.find(x=>x.id===oid);
  if(!o)return;
  o.iid=iid?parseInt(iid):null;
  MAP.closePopup();
  drawInstallers();drawOrders();drawSidebar();updateStats();
  const inst=INST.find(i=>i.id===o.iid);
  toast(inst?`${o.addr} → ${inst.first} ${inst.last}`:`${o.addr} marked unassigned`);
}

function setFilter(f){
  curFilter=f; curInst=null;
  ['all','up','dn','svc','none'].forEach(v=>{
    document.getElementById('c-'+v).classList.toggle('on',v===f);
    document.getElementById('sp-'+v).classList.toggle('on',v===f);
  });
  document.getElementById('assign-bar').style.display='none';
  drawSidebar();drawOrders();
}

function filterByInst(id){
  curInst=curInst===id?null:id;
  curFilter='all';
  ['all','up','dn','svc','none'].forEach(v=>{
    document.getElementById('c-'+v).classList.toggle('on',v==='all');
    document.getElementById('sp-'+v).classList.toggle('on',v==='all');
  });
  drawSidebar();drawOrders();
  const inst=INST.find(i=>i.id===curInst);
  const bar=document.getElementById('assign-bar');
  if(inst){
    bar.style.display='flex';
    bar.innerHTML=`
      <div style="font-size:11px;color:#555;flex:1">
        <span style="font-weight:600;color:${inst.color}">${inst.first} ${inst.last}</span>
        <span style="color:#999"> · ${ORDERS.filter(o=>o.iid===inst.id).length} assigned · ${ORDERS.filter(o=>!o.iid).length} unassigned</span>
      </div>
      <button onclick="autoAssignTo(${inst.id})" style="padding:5px 11px;border-radius:8px;border:none;background:${inst.color};color:#fff;font-size:11px;font-weight:600;cursor:pointer">
        Assign all unassigned to ${inst.first}
      </button>`;
  } else {
    bar.style.display='none';
  }
}

function autoAssignTo(iid){
  let n=0;
  ORDERS.forEach(o=>{if(!o.iid){o.iid=iid;n++;}});
  const inst=INST.find(i=>i.id===iid);
  drawInstallers();drawOrders();drawSidebar();updateStats();
  filterByInst(iid);
  toast(n?`${n} orders assigned to ${inst.first} ${inst.last}`:'No unassigned orders');
}

function toggleAutoAssign(on){
  if(!on)return;
  let idx=0;
  ORDERS.forEach(o=>{if(!o.iid){o.iid=INST[idx%INST.length].id;idx++;}});
  drawInstallers();drawOrders();drawSidebar();updateStats();
  toast('Auto-assigned '+idx+' unassigned orders');
}

function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('op-panel').classList.toggle('open',panelOpen);
}

function scheduleAll(){
  const u=ORDERS.filter(o=>!o.iid).length;
  const rows=INST.map(inst=>{
    const a=ORDERS.filter(o=>o.iid===inst.id);
    return{inst,total:a.length,up:a.filter(o=>o.type==='install').length,dn:a.filter(o=>o.type==='remove').length,svc:a.filter(o=>o.type==='service').length};
  }).filter(r=>r.total>0);
  document.getElementById('sched-body').innerHTML=`
    <p style="font-size:13px;color:#555;margin-bottom:12px;line-height:1.6">Review and push to all installer apps.</p>
    ${u?`<div style="padding:8px 12px;background:#FCEBEB;border-radius:8px;color:#791F1F;font-weight:500;font-size:12px;margin-bottom:12px">⚠ ${u} order${u>1?'s are':' is'} unassigned and will not be included.</div>`:'<div style="padding:8px 12px;background:#EAF3DE;border-radius:8px;color:#27500A;font-weight:500;font-size:12px;margin-bottom:12px">✓ All orders assigned.</div>'}
    ${rows.map(r=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f9f9f7;border-radius:10px;margin-bottom:7px">
        <div style="width:34px;height:34px;border-radius:8px;background:${r.inst.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">${r.inst.ini}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${r.inst.first} ${r.inst.last}</div>
          <div style="font-size:11px;color:#777;margin-top:1px">${r.total} stop${r.total>1?'s':''} · ${r.up} UP · ${r.dn} DN${r.svc?` · ${r.svc} Service`:''}</div>
        </div>
        <span style="font-size:11px;color:#16A322;font-weight:600">Ready ✓</span>
      </div>`).join('')}
    ${rows.length===0?'<div style="padding:20px;text-align:center;color:#999">No orders assigned yet.</div>':''}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button onclick="pushToApps(${rows.length})" style="padding:8px 18px;border-radius:8px;border:none;background:#16A322;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Push to ${rows.length} installer${rows.length>1?'s':''}</button>
    </div>`;
  document.getElementById('sched-modal').style.display='flex';
}

function pushToApps(n){
  document.getElementById('sched-body').innerHTML=`
    <div style="text-align:center;padding:28px 0">
      <div style="width:54px;height:54px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px">✓</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">Schedule pushed!</div>
      <div style="font-size:13px;color:#555;margin-bottom:3px">${n} installer${n>1?'s':''} notified.</div>
      <div style="font-size:12px;color:#999">Installers will see their stops in order when they open the app.</div>
      <button onclick="closeModal()" style="margin-top:18px;padding:8px 24px;border-radius:8px;border:none;background:#185FA5;color:#fff;font-size:13px;font-weight:500;cursor:pointer">Done</button>
    </div>`;
  toast('Schedule pushed to '+n+' installer app'+(n>1?'s':''));
}

function closeModal(){document.getElementById('sched-modal').style.display='none';}

function toast(msg){
  let t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:99999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);font-family:system-ui;display:none';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2800);
}

window.addEventListener('load',()=>{
  MAP=L.map('map',{zoomControl:true,scrollWheelZoom:true}).setView([32.22,-110.97],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(MAP);
  drawInstallers();
  drawOrders();
  drawSidebar();
  drawLegend();
  updateStats();
  setTimeout(()=>MAP.invalidateSize(),100);
  window.addEventListener('resize',()=>MAP.invalidateSize());
});
</script>
</body>
</html>
